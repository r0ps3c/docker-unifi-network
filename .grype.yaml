ignore:
  # All packages under Ubiquiti's bundled lib directory are owned by the unifi
  # apt package and cannot be patched independently. Suppressing by path means
  # this rule stays valid across UniFi version upgrades without manual updates.
  - package:
      location: "/usr/lib/unifi/lib/local/**"

  # Go modules embedded in the pebble binary (Ubuntu-packaged process manager).
  # The Dockerfile already runs apt upgrade on every build, so pebble is always
  # the latest version Ubuntu ships. CVEs here require Ubuntu to rebuild pebble
  # with a patched Go toolchain — outside our control.
  - package:
      location: "/usr/bin/pebble"
