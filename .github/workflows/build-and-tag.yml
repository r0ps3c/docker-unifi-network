name: Build and Tag Docker Image

on:
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  build-scan-push:
    uses: r0ps3c/gh-shared-workflows/.github/workflows/docker-build-scan-push.yml@c6ef69d22ab5c31b04437b8c5ee27be005df3d3c # main
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      image-ref: unifi-network:main
      version-extract-command: "dpkg -s unifi | grep '^Version:' | awk '{print $2}'"
      test-command: make test-structure && make test-standalone && make test-integration
    secrets: inherit
