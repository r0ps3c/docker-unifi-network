name: Build and Tag Docker Image

on:
  schedule:
    - cron: '30 4 * * 1'  # Weekly Monday 04:30 UTC
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  build-scan-push:
    uses: r0ps3c/gh-shared-workflows/.github/workflows/docker-build-scan-push.yml@a83041b1ba6cfae526fa7caab56947a08fc8d882 # main
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      image-ref: unifi-network:main
      version-extract-command: "dpkg -s unifi | grep '^Version:' | awk '{print $2}'"
      test-command: make test-structure && make test-standalone && make test-integration
    secrets: inherit
