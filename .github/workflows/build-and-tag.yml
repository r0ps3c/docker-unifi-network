name: Build and Tag Docker Image

on:
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  workflow_dispatch:

jobs:
  build-scan-push:
    uses: r0ps3c/gh-shared-workflows/.github/workflows/docker-build-scan-push.yml@3bc8a86e2aa0762b4d6e239198dc0c639d2fe856 # main
    with:
      image-ref: unifi-network:main
      version-extract-command: "dpkg-query -W --showformat='${Version}' unifi"
      test-command: make test-structure && make test-standalone && make test-integration
    secrets: inherit
