name: Check for UniFi Updates
permissions:
  contents: read
  actions: write

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}:main

jobs:
  check-unifi-updates:
    runs-on: ubuntu-latest
    steps:
      # Check version currently in the published image
      - name: Get deployed UniFi version
        id: deployed-version
        run: |
          if docker pull "$IMAGE" 2>/dev/null; then
            OLD_VERSION=$(docker run --rm --entrypoint sh "$IMAGE" -c \
              "dpkg -s unifi | grep '^Version:' | awk '{print \$2}'")
          else
            OLD_VERSION=""
          fi
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT

      # Check latest version available from Ubiquiti
      - name: Check latest UniFi version from API
        id: check-version
        run: |
          NEW_VERSION=$(curl -sf \
            'https://fw-update.ubnt.com/api/firmware-latest?filter=eq~~product~~unifi-controller&filter=eq~~platform~~unix&filter=eq~~channel~~release' \
            | grep -o '"version":"[^"]*"' | head -1 | cut -d'"' -f4 | sed 's/^v//' | cut -d'+' -f1)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          OLD_VERSION="${{ steps.deployed-version.outputs.old_version }}"
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "UniFi version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "UniFi version unchanged: $NEW_VERSION"
          fi

      # Trigger build workflow
      - name: Trigger build on version change
        if: steps.check-version.outputs.version_changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-tag.yml',
              ref: 'main'
            });
            core.info('Build triggered for UniFi version ${{ steps.check-version.outputs.new_version }}');
