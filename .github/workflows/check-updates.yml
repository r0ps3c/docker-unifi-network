name: Check for UniFi Updates
permissions:
  contents: read
  actions: write

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

jobs:
  check-unifi-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Restore cached version
      - name: Restore cached UniFi version
        id: cache-restore
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: unifi-version.txt
          key: unifi-version-cache

      # Check latest version
      - name: Check UniFi version from API
        id: check-version
        run: |
          # Get latest version from Ubiquiti firmware API
          NEW_VERSION=$(curl -sf \
            'https://fw-update.ubnt.com/api/firmware-latest?filter=eq~~product~~unifi-controller&filter=eq~~platform~~unix&filter=eq~~channel~~release' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['_embedded']['firmware'][0]['version'].split('+')[0].lstrip('v'))")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Get cached version
          if [ -f "unifi-version.txt" ]; then
            OLD_VERSION=$(cat unifi-version.txt)
          else
            OLD_VERSION=""
          fi
          echo "old_version=$OLD_VERSION" >> $GITHUB_OUTPUT

          # Check if changed
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "UniFi version changed: $OLD_VERSION -> $NEW_VERSION"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "UniFi version unchanged: $NEW_VERSION"
          fi

      # Save new version to cache
      - name: Update version cache
        if: steps.check-version.outputs.version_changed == 'true'
        run: echo "${{ steps.check-version.outputs.new_version }}" > unifi-version.txt

      - name: Save cache
        if: steps.check-version.outputs.version_changed == 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: unifi-version.txt
          key: unifi-version-cache

      # Trigger build workflow
      - name: Trigger build on version change
        if: steps.check-version.outputs.version_changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-and-tag.yml',
              ref: 'main'
            });
            core.info('Build triggered for UniFi version ${{ steps.check-version.outputs.new_version }}');
