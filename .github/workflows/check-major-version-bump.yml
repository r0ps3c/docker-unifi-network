name: Check for Major Version Bump
permissions:
  contents: write  # Needed to push PR branch
  pull-requests: write

on:
  workflow_run:
    workflows: ["Build and Tag Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-major-bump:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Get main branch UniFi version
        id: main-version
        run: |
          # Pull latest image from main
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          MAIN_VERSION=$(docker run --rm --entrypoint sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main -c "dpkg-query -W --showformat='\${Version}' unifi")
          MAIN_MAJOR=$(echo "$MAIN_VERSION" | cut -d. -f1)
          echo "major=$MAIN_MAJOR" >> $GITHUB_OUTPUT
          echo "full=$MAIN_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: stable
          path: stable-branch

      - name: Get stable branch UniFi version
        id: stable-version
        run: |
          cd stable-branch
          # Check if stable image exists
          if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable 2>/dev/null; then
            STABLE_VERSION=$(docker run --rm --entrypoint sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable -c "dpkg-query -W --showformat='\${Version}' unifi")
            STABLE_MAJOR=$(echo "$STABLE_VERSION" | cut -d. -f1)
          else
            # No stable tag yet, treat as major version 0
            STABLE_MAJOR=0
            STABLE_VERSION="none"
          fi
          echo "major=$STABLE_MAJOR" >> $GITHUB_OUTPUT
          echo "full=$STABLE_VERSION" >> $GITHUB_OUTPUT

      - name: Check if major version changed
        id: check-bump
        run: |
          MAIN_MAJOR="${{ steps.main-version.outputs.major }}"
          STABLE_MAJOR="${{ steps.stable-version.outputs.major }}"

          if [ "$MAIN_MAJOR" != "$STABLE_MAJOR" ]; then
            echo "major_changed=true" >> $GITHUB_OUTPUT
            echo "Major version bump detected: $STABLE_MAJOR -> $MAIN_MAJOR"
          else
            echo "major_changed=false" >> $GITHUB_OUTPUT
            echo "No major version change (both at version $MAIN_MAJOR)"
          fi

      - name: Create PR for stable promotion
        if: steps.check-bump.outputs.major_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="promote-stable-v${{ steps.main-version.outputs.major }}"
          git push origin HEAD:"refs/heads/$BRANCH" --force

          gh label create "stable-promotion" --color "0075ca" --description "Promotes to stable branch" 2>/dev/null || true
          gh label create "major-version-bump" --color "e4e669" --description "Indicates a major version bump" 2>/dev/null || true

          EXISTING=$(gh pr list --head "$BRANCH" --base stable --json number --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" = "0" ]; then
            cat > /tmp/pr-body.md << EOF
          ## UniFi Major Version Promotion

          This PR promotes the stable branch to UniFi **${{ steps.main-version.outputs.major }}.x**.

          ### Version Changes
          - Current stable: UniFi ${{ steps.stable-version.outputs.full }} (major version ${{ steps.stable-version.outputs.major }})
          - New version: UniFi ${{ steps.main-version.outputs.full }} (major version ${{ steps.main-version.outputs.major }})

          ### What happens when merged:
          - \`stable\` branch will be updated to match \`main\`
          - \`stable\` tag will point to UniFi ${{ steps.main-version.outputs.major }}.x

          ### Testing Checklist
          - [ ] Review [build logs](https://github.com/${{ github.repository }}/actions)
          - [ ] Verify \`latest\` tag works: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`
          - [ ] Test UniFi ${{ steps.main-version.outputs.major }}.x functionality
          - [ ] Check for breaking changes in [UniFi release notes](https://community.ui.com/releases)

          ### Manual Testing Commands
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.main-version.outputs.major }}
          docker run -d --name unifi-test -p 8443:8443 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.main-version.outputs.major }}
          docker rm -f unifi-test
          \`\`\`

          ---
          This PR was automatically created by the version bump detection workflow.
          EOF

            gh pr create \
              --base stable \
              --head "$BRANCH" \
              --title "Promote UniFi ${{ steps.main-version.outputs.major }}.x to stable" \
              --label "stable-promotion" \
              --label "major-version-bump" \
              --body-file /tmp/pr-body.md
          else
            echo "PR already exists for branch $BRANCH, skipping creation"
          fi
